version: "3.8"

services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: always
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - quick-gari-network

  # Backend API
  backend:
    build:
      context: ./quick-gari
      dockerfile: Dockerfile
      target: production
    container_name: quick-gari-backend
    restart: always
    expose:
      - "3000"
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
    networks:
      - quick-gari-network

  # Dashboard Frontend
  dashboard:
    build:
      context: ./quick-gari-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: quick-gari-dashboard
    restart: always
    expose:
      - "3000"
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.priority=1"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"
    depends_on:
      - backend
    networks:
      - quick-gari-network

networks:
  quick-gari-network:
    driver: bridge
