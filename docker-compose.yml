version: "3.8"
services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: always
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - quick-gari-network

  # Backend API (Production image from Docker Hub)
  backend:
    image: shahinali1998/quick-gari-backend:latest
    container_name: quick-gari-backend
    restart: always
    expose:
      - "3000"
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`) || PathPrefix(`/socket.io`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.backend-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend.middlewares=backend-stripprefix"
      - "traefik.http.routers.backend.websocket=true"
    networks:
      - quick-gari-network

  # Dashboard Frontend (Production image from Docker Hub)
  dashboard:
    image: shahinali1998/quick-gari-dashboard:latest
    container_name: quick-gari-dashboard
    restart: always
    expose:
      - "3000"
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.priority=1"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"
    depends_on:
      - backend
    networks:
      - quick-gari-network

networks:
  quick-gari-network:
    driver: bridge
